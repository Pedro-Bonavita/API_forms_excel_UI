<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feedback - Bike Store</title>
    <style>
        :root {
            --primary: #6C63FF;
            --primary-light: #EBEBFF;
            --secondary: #FFD700;
            --text: #2D3436;
            --bg: #F4F7F6;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            padding: 40px 20px;
        }

        .form-container {
            background: white;
            max-width: 600px;
            width: 100%;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            overflow: hidden;
            border-top: 10px solid var(--primary);
        }

        .header-image {
            width: 100%;
            height: 200px;
            background: var(--primary-light);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .header-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .content {
            padding: 30px;
        }

        h1 { font-size: 24px; color: var(--primary); margin-bottom: 10px; }
        p { color: #636e72; font-size: 14px; margin-bottom: 30px; }

        .question-label {
            font-weight: 600;
            display: block;
            margin-bottom: 15px;
            font-size: 16px;
        }

        /* Custom Radio Cards */
        .options-grid {
            display: grid;
            gap: 12px;
        }

        .option-card {
            border: 2px solid #f1f2f6;
            padding: 15px;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
        }

        .option-card:hover {
            border-color: var(--primary);
            background: var(--primary-light);
        }

        input[type="radio"] {
            display: none;
        }

        input[type="radio"]:checked + .option-card {
            border-color: var(--primary);
            background: var(--primary-light);
            font-weight: bold;
        }

        .btn-submit {
            background-color: var(--secondary);
            color: var(--text);
            border: none;
            padding: 15px 30px;
            border-radius: 10px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            width: 100%;
            margin-top: 30px;
            transition: transform 0.2s;
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(255, 215, 0, 0.4);
        }
    </style>
</head>
<body>

<div class="form-container">
    <div class="header-image">
        <img src="https://images.unsplash.com/photo-1532298229144-0ee050c99dfe?auto=format&fit=crop&w=800&q=80" alt="Bicycle Store App">
    </div>

    <div class="content">
        <h1>Sua opinião vale muito!</h1>
        <p>Ajude-nos a melhorar a experiência da nossa loja de bicicletas.</p>

        <form action="#">
            <label class="question-label">Você indicaria o aplicativo para outra pessoa? *</label>
            
            <div class="options-grid">
                <label>
                    <input type="radio" name="indicacao" value="sim">
                    <div class="option-card">🚀 Sim, com certeza!</div>
                </label>

                <label>
                    <input type="radio" name="indicacao" value="nao">
                    <div class="option-card">❌ Não indicaria</div>
                </label>

                <label>
                    <input type="radio" name="indicacao" value="ressalvas">
                    <div class="option-card">⚠️ Indicaria, mas com ressalvas</div>
                </label>

                <label>
                    <input type="radio" name="indicacao" value="mudancas">
                    <div class="option-card">⚙️ Indicaria após melhorias</div>
                </label>
            </div>

            <button type="submit" class="btn-submit">Enviar Feedback</button>
        </form>
    </div>
</div>

</body>
</html>
